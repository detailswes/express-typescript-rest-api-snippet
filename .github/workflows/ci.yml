name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-at-least-32-characters
          DB_URL: mongodb://127.0.0.1:27017/test
          MAIL_HOST: smtp.test.com
          MAIL_PORT: "587"
          MAIL_USERNAME: test
          MAIL_PASSWORD: test
          MAIL_FROM_EMAIL: test@example.com
          ALLOWED_ORIGINS: http://localhost:3000
          LOG_LEVEL: silent
